<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login & Register - Kids English Fun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: "Fredoka", sans-serif;
      background: linear-gradient(180deg, #9de9ff 0%, #84d8ff 55%, #72d770 100%);
      display: grid;
      place-items: center;
      padding: 1rem;
      color: #21406b;
    }
    .container {
      width: min(900px, 96vw);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .card {
      background: #fff;
      border: 4px solid #fff;
      border-radius: 24px;
      box-shadow: 0 12px 0 rgba(35, 50, 95, 0.16);
      padding: 1rem;
    }
    h1 {
      grid-column: 1 / -1;
      text-align: center;
      font-family: "Baloo 2", cursive;
      font-size: clamp(2rem, 5vw, 3.2rem);
      color: #fff;
      text-shadow: 0 4px 0 #2c67cf;
      margin-bottom: 0.2rem;
    }
    .subtitle {
      grid-column: 1 / -1;
      text-align: center;
      color: #1e4f92;
      font-weight: 600;
      margin-bottom: 0.2rem;
    }
    h2 {
      font-family: "Baloo 2", cursive;
      color: #2e4f88;
      margin-bottom: 0.7rem;
    }
    .field { margin-bottom: 0.6rem; text-align: left; }
    label { display: block; margin-bottom: 0.2rem; font-weight: 500; }
    input {
      width: 100%;
      border: 2px solid #d2dcff;
      border-radius: 12px;
      padding: 0.55rem 0.65rem;
      font-size: 1rem;
      font-family: inherit;
    }
    .btn {
      border: 3px solid #fff;
      border-radius: 12px;
      padding: 0.5rem 1rem;
      font-family: "Baloo 2", cursive;
      font-size: 1.1rem;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 7px 0 rgba(0, 0, 0, 0.15);
    }
    .btn-register { background: #4e8bff; }
    .btn-login { background: #ff77b3; }
    .message {
      margin-top: 0.6rem;
      min-height: 2.4rem;
      background: #f5f8ff;
      border: 2px dashed #cbd8ff;
      border-radius: 12px;
      padding: 0.45rem 0.6rem;
      font-size: 0.95rem;
      white-space: pre-wrap;
    }
    .home {
      grid-column: 1 / -1;
      text-align: center;
      margin-top: 0.2rem;
    }
    .home a {
      color: #fff;
      font-weight: 700;
      text-decoration: none;
      background: #5b73df;
      border: 3px solid #fff;
      border-radius: 999px;
      padding: 0.25rem 0.9rem;
      display: inline-block;
    }
    @media (max-width: 760px) {
      .container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Login & Register</h1>
    <p class="subtitle">Simple API + MySQL authentication</p>

    <section class="card">
      <h2>Register</h2>
      <form id="registerForm">
        <div class="field">
          <label for="registerName">Name</label>
          <input id="registerName" name="name" required />
        </div>
        <div class="field">
          <label for="registerEmail">Email</label>
          <input id="registerEmail" name="email" type="email" required />
        </div>
        <div class="field">
          <label for="registerPassword">Password</label>
          <input id="registerPassword" name="password" type="password" minlength="6" required />
        </div>
        <button class="btn btn-register" type="submit">Create Account</button>
      </form>
      <div id="registerMessage" class="message"></div>
    </section>

    <section class="card">
      <h2>Login</h2>
      <form id="loginForm">
        <div class="field">
          <label for="loginEmail">Email</label>
          <input id="loginEmail" name="email" type="email" required />
        </div>
        <div class="field">
          <label for="loginPassword">Password</label>
          <input id="loginPassword" name="password" type="password" required />
        </div>
        <button class="btn btn-login" type="submit">Sign In</button>
      </form>
      <div id="loginMessage" class="message"></div>
    </section>

    <div class="home">
      <a href="index.html">Back Home</a>
    </div>
  </div>

  <script>
    const registerForm = document.getElementById("registerForm");
    const loginForm = document.getElementById("loginForm");
    const registerMessage = document.getElementById("registerMessage");
    const loginMessage = document.getElementById("loginMessage");

    async function postJson(url, payload) {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      return { ok: res.ok, data };
    }

    registerForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      registerMessage.textContent = "Processing...";
      const formData = new FormData(registerForm);
      const payload = Object.fromEntries(formData.entries());

      try {
        const result = await postJson("api/register.php", payload);
        registerMessage.textContent = result.data.message || "Register request completed.";
        if (result.ok) {
          registerForm.reset();
        }
      } catch (error) {
        registerMessage.textContent = "Cannot connect to API.";
      }
    });

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      loginMessage.textContent = "Processing...";
      const formData = new FormData(loginForm);
      const payload = Object.fromEntries(formData.entries());

      try {
        const result = await postJson("api/login.php", payload);
        if (result.ok && result.data.data) {
          loginMessage.textContent = `Welcome ${result.data.data.name}! Login successful.`;
        } else {
          loginMessage.textContent = result.data.message || "Login failed.";
        }
      } catch (error) {
        loginMessage.textContent = "Cannot connect to API.";
      }
    });
  </script>
</body>
</html>
