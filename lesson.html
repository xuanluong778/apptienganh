<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocabulary Lesson - Kids English Fun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --sky: #9de9ff;
      --yellow: #ffd85f;
      --blue: #4f8cff;
      --pink: #ff80b8;
      --mint: #72e0bf;
      --purple: #8f7bff;
      --text: #25406d;
      --shadow: 0 14px 0 rgba(45, 56, 110, 0.18);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Fredoka", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, var(--sky) 0%, #89d6ff 58%, #74d472 100%);
      display: grid;
      place-items: center;
      padding: 1rem;
      overflow: hidden;
    }

    .page {
      width: min(860px, 95vw);
      text-align: center;
      position: relative;
    }

    .badge {
      display: inline-block;
      margin-bottom: 0.8rem;
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
      font-family: "Baloo 2", cursive;
      font-weight: 700;
      color: #4f52b2;
      background: #fff;
      border: 3px solid #d6d9ff;
      box-shadow: 0 8px 0 rgba(91, 90, 203, 0.15);
      transform: rotate(-5deg);
    }

    h1 {
      font-family: "Baloo 2", cursive;
      font-size: clamp(2rem, 5vw, 3.5rem);
      color: #fff;
      text-shadow: 0 4px 0 #2f68cd, 0 12px 20px rgba(24, 42, 92, 0.35);
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-size: clamp(1rem, 2.4vw, 1.3rem);
      font-weight: 600;
      color: #1f4e8f;
      margin-bottom: 1.2rem;
    }

    .card {
      background: #fff;
      border: 4px solid #fff;
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 1.2rem;
      animation: bob 2.8s ease-in-out infinite;
    }

    .image-wrap {
      width: min(360px, 80%);
      aspect-ratio: 1 / 1;
      margin: 0 auto 1rem;
      border-radius: 28px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, #ffe8f5, #e8f0ff);
      border: 4px dashed #c9d5ff;
    }

    .image-wrap img {
      width: min(200px, 70%);
      height: auto;
      filter: drop-shadow(0 8px 8px rgba(31, 61, 112, 0.2));
      animation: wiggle 2.2s ease-in-out infinite;
    }

    .word {
      font-family: "Baloo 2", cursive;
      font-size: clamp(2rem, 6vw, 3.2rem);
      color: #2f4d84;
      margin-bottom: 0.3rem;
    }

    .phonetic {
      font-size: 1.2rem;
      color: #6379a2;
      margin-bottom: 1rem;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin-bottom: 0.8rem;
    }

    button {
      border: 4px solid #fff;
      border-radius: 18px;
      color: #fff;
      font-family: "Baloo 2", cursive;
      font-size: 1.25rem;
      font-weight: 700;
      padding: 0.55rem 1.3rem;
      cursor: pointer;
      box-shadow: 0 9px 0 rgba(0, 0, 0, 0.17);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 12px 0 rgba(0, 0, 0, 0.17);
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 5px 0 rgba(0, 0, 0, 0.2);
    }

    .speak-btn {
      background: linear-gradient(180deg, #fcb04c, #ff8a29);
    }

    .nav-btn.prev {
      background: linear-gradient(180deg, #7dd7fd, #4f8cff);
    }

    .nav-btn.next {
      background: linear-gradient(180deg, #ff96c7, #ff6bae);
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 0.4rem;
      margin-top: 0.4rem;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #b6c7ea;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .dot.active {
      background: var(--purple);
      transform: scale(1.2);
    }

    .back-link {
      display: inline-block;
      margin-top: 1rem;
      color: #fff;
      background: #4f67d7;
      border-radius: 999px;
      border: 3px solid #fff;
      font-family: "Baloo 2", cursive;
      font-weight: 700;
      text-decoration: none;
      padding: 0.28rem 1rem;
      box-shadow: 0 6px 0 rgba(28, 44, 106, 0.2);
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-7px); }
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(2deg); }
      75% { transform: rotate(-2deg); }
    }

    @media (max-width: 640px) {
      body {
        overflow-y: auto;
      }

      button {
        width: 100%;
      }

      .controls {
        gap: 0.6rem;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <span class="badge">Lesson 1</span>
    <h1>Vocabulary Cards</h1>
    <p class="subtitle">Tap the speaker and repeat the word out loud!</p>

    <section class="card">
      <div class="image-wrap">
        <img id="wordImage" src="" alt="" />
      </div>
      <h2 id="wordText" class="word"></h2>
      <p id="wordPhonetic" class="phonetic"></p>

      <div class="controls">
        <audio-pronounce-button id="speakBtn" label="🔊 Pronounce"></audio-pronounce-button>
      </div>
      <div class="controls">
        <button id="prevBtn" class="nav-btn prev">⬅ Previous</button>
        <button id="nextBtn" class="nav-btn next">Next ➡</button>
      </div>

      <div id="dots" class="dots"></div>
    </section>

    <a class="back-link" href="index.html">← Back Home</a>
  </main>

  <script src="audio-pronounce-button.js"></script>
  <script>
    const vocabulary = [
      {
        word: "Apple",
        phonetic: "/ˈaep.uhl/",
        image: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f34e.svg"
      },
      {
        word: "Cat",
        phonetic: "/kaet/",
        image: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f431.svg"
      },
      {
        word: "Book",
        phonetic: "/bʊk/",
        image: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f4d6.svg"
      },
      {
        word: "Ball",
        phonetic: "/bɔːl/",
        image: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/26bd.svg"
      }
    ];

    let currentIndex = 0;
    const viewedWords = new Set();

    const wordImage = document.getElementById("wordImage");
    const wordText = document.getElementById("wordText");
    const wordPhonetic = document.getElementById("wordPhonetic");
    const speakBtn = document.getElementById("speakBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const dotsContainer = document.getElementById("dots");

    function createDots() {
      dotsContainer.innerHTML = "";
      vocabulary.forEach((_, index) => {
        const dot = document.createElement("span");
        dot.className = "dot";
        if (index === currentIndex) {
          dot.classList.add("active");
        }
        dotsContainer.appendChild(dot);
      });
    }

    function updateCard() {
      const item = vocabulary[currentIndex];
      viewedWords.add(item.word);
      wordImage.src = item.image;
      wordImage.alt = item.word;
      wordText.textContent = item.word;
      wordPhonetic.textContent = item.phonetic;

      speakBtn.setAttribute("word", item.word);

      const dots = document.querySelectorAll(".dot");
      dots.forEach((dot, index) => {
        dot.classList.toggle("active", index === currentIndex);
      });

      const lessonProgress = Math.round((viewedWords.size / vocabulary.length) * 100);
      localStorage.setItem("lessonProgress", String(lessonProgress));
      localStorage.setItem("lessonViewedWords", String(viewedWords.size));
      if (lessonProgress === 100) {
        localStorage.setItem("completedLessons", JSON.stringify(["Lesson 1"]));
      }
    }

    prevBtn.addEventListener("click", () => {
      currentIndex = (currentIndex - 1 + vocabulary.length) % vocabulary.length;
      updateCard();
    });

    nextBtn.addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % vocabulary.length;
      updateCard();
    });

    createDots();
    updateCard();
  </script>
</body>
</html>
