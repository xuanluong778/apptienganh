<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Game - Kids English Fun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --sky: #9de8ff;
      --blue: #4f8cff;
      --pink: #ff7eb6;
      --green: #61ca7a;
      --red: #ff6c6c;
      --text: #25406e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Fredoka", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, var(--sky) 0%, #84d9ff 55%, #73d773 100%);
      display: grid;
      place-items: center;
      padding: 1rem;
    }

    .quiz-page {
      width: min(760px, 96vw);
      text-align: center;
    }

    h1 {
      font-family: "Baloo 2", cursive;
      font-size: clamp(2rem, 5vw, 3.4rem);
      color: #fff;
      text-shadow: 0 4px 0 #2a68cb, 0 10px 16px rgba(24, 44, 98, 0.3);
      margin-bottom: 0.3rem;
    }

    .subtitle {
      color: #1f4f90;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .quiz-card {
      background: #fff;
      border: 4px solid #fff;
      border-radius: 26px;
      box-shadow: 0 14px 0 rgba(37, 49, 102, 0.16);
      padding: 1.2rem;
    }

    .word-label {
      font-family: "Baloo 2", cursive;
      color: #5c6ee2;
      font-size: 1.2rem;
      margin-bottom: 0.3rem;
    }

    .word {
      font-family: "Baloo 2", cursive;
      font-size: clamp(2rem, 6vw, 3.1rem);
      color: #2d4f87;
      margin-bottom: 1rem;
    }

    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.7rem;
    }

    .choice-btn {
      border: 3px solid #fff;
      border-radius: 16px;
      padding: 0.75rem 0.55rem;
      color: #fff;
      font-family: "Baloo 2", cursive;
      font-size: 1.3rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 0 rgba(0, 0, 0, 0.15);
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .choice-btn:nth-child(1) { background: linear-gradient(180deg, #68d5ff, var(--blue)); }
    .choice-btn:nth-child(2) { background: linear-gradient(180deg, #ff94c6, var(--pink)); }
    .choice-btn:nth-child(3) { background: linear-gradient(180deg, #ffc878, #ffad4f); }
    .choice-btn:nth-child(4) { background: linear-gradient(180deg, #b7a4ff, #8a78ff); }

    .choice-btn:hover:not(:disabled) {
      transform: translateY(-2px) scale(1.02);
    }

    .choice-btn.correct {
      background: var(--green);
    }

    .choice-btn.incorrect {
      background: var(--red);
    }

    .choice-btn:disabled {
      cursor: default;
      opacity: 0.9;
    }

    .status {
      min-height: 2rem;
      margin-top: 0.8rem;
      font-family: "Baloo 2", cursive;
      font-size: 1.35rem;
      color: #315089;
    }

    .footer {
      margin-top: 0.9rem;
      display: flex;
      justify-content: center;
      gap: 0.7rem;
      flex-wrap: wrap;
    }

    .pill {
      background: #fff;
      border: 3px solid #d9e3ff;
      border-radius: 999px;
      padding: 0.35rem 0.9rem;
      font-family: "Baloo 2", cursive;
      color: #5265db;
      font-weight: 700;
    }

    .next-btn, .home-link {
      border: 3px solid #fff;
      border-radius: 14px;
      padding: 0.45rem 1rem;
      color: #fff;
      font-family: "Baloo 2", cursive;
      font-size: 1.1rem;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 7px 0 rgba(0, 0, 0, 0.15);
    }

    .next-btn {
      background: #4f88ff;
    }

    .home-link {
      background: #ff78b2;
      display: inline-block;
    }

    @media (max-width: 640px) {
      .choices {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="quiz-page">
    <h1>Word Quiz Game</h1>
    <p class="subtitle">Choose the correct meaning for each English word!</p>

    <section class="quiz-card">
      <p class="word-label">What does this word mean?</p>
      <h2 id="quizWord" class="word">Apple</h2>
      <div id="choices" class="choices"></div>
      <p id="status" class="status"></p>
    </section>

    <div class="footer">
      <span id="scorePill" class="pill">Score: 0</span>
      <span id="progressPill" class="pill">Question: 1/5</span>
      <button id="nextBtn" class="next-btn" disabled>Next</button>
      <a href="index.html" class="home-link">Back Home</a>
    </div>
  </main>

  <script>
    const quizData = [
      {
        word: "Apple",
        correct: "Qua tao",
        options: ["Con meo", "Qua tao", "Quyen sach", "Qua bong"]
      },
      {
        word: "Cat",
        correct: "Con meo",
        options: ["Con meo", "Qua cam", "Cai ban", "Cay but"]
      },
      {
        word: "Book",
        correct: "Quyen sach",
        options: ["Chiec ghe", "Quyen sach", "Con cho", "Banh mi"]
      },
      {
        word: "Ball",
        correct: "Qua bong",
        options: ["Doi giay", "Cai ao", "Qua bong", "Con ca"]
      },
      {
        word: "Star",
        correct: "Ngoi sao",
        options: ["Mat trang", "Ngoi sao", "Mat troi", "Dam may"]
      }
    ];

    const quizWord = document.getElementById("quizWord");
    const choices = document.getElementById("choices");
    const statusText = document.getElementById("status");
    const scorePill = document.getElementById("scorePill");
    const progressPill = document.getElementById("progressPill");
    const nextBtn = document.getElementById("nextBtn");

    let currentIndex = 0;
    let score = 0;
    let answered = false;

    function shuffle(list) {
      const copy = [...list];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function updatePills() {
      scorePill.textContent = `Score: ${score}`;
      progressPill.textContent = `Question: ${currentIndex + 1}/${quizData.length}`;
    }

    function renderQuestion() {
      answered = false;
      nextBtn.disabled = true;
      statusText.textContent = "";
      const q = quizData[currentIndex];
      quizWord.textContent = q.word;
      choices.innerHTML = "";

      const shuffledChoices = shuffle(q.options);
      shuffledChoices.forEach((choice) => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.textContent = choice;
        btn.addEventListener("click", () => handleAnswer(btn, choice));
        choices.appendChild(btn);
      });

      updatePills();
    }

    function handleAnswer(button, selected) {
      if (answered) {
        return;
      }
      answered = true;
      const q = quizData[currentIndex];
      const isCorrect = selected === q.correct;
      const allButtons = document.querySelectorAll(".choice-btn");

      allButtons.forEach((btn) => {
        btn.disabled = true;
        if (btn.textContent === q.correct) {
          btn.classList.add("correct");
        }
      });

      if (isCorrect) {
        button.classList.add("correct");
        statusText.textContent = "Correct! Great job!";
        score += 1;
      } else {
        button.classList.add("incorrect");
        statusText.textContent = `Oops! Correct answer: ${q.correct}`;
      }

      updatePills();
      nextBtn.disabled = false;
    }

    nextBtn.addEventListener("click", () => {
      if (currentIndex < quizData.length - 1) {
        currentIndex += 1;
        renderQuestion();
      } else {
        choices.innerHTML = "";
        quizWord.textContent = "Quiz Finished!";
        statusText.textContent = `Your final score is ${score}/${quizData.length}`;
        localStorage.setItem("quizScore", String(score));
        localStorage.setItem("quizTotal", String(quizData.length));
        nextBtn.textContent = "Play Again";
        nextBtn.disabled = false;
        nextBtn.onclick = () => {
          currentIndex = 0;
          score = 0;
          nextBtn.textContent = "Next";
          nextBtn.onclick = null;
          renderQuestion();
        };
      }
    });

    renderQuestion();
  </script>
</body>
</html>
