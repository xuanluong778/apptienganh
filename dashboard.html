<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Kids English Fun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --sky: #9ce7ff;
      --blue: #4f8cff;
      --pink: #ff7eb6;
      --mint: #62cfb6;
      --orange: #ffae52;
      --purple: #8f7cff;
      --text: #27416d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: "Fredoka", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, var(--sky) 0%, #84d7ff 55%, #75d974 100%);
      padding: 1rem;
    }

    .page {
      width: min(1050px, 96vw);
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      font-family: "Baloo 2", cursive;
      font-size: clamp(2rem, 5vw, 3.5rem);
      color: #fff;
      text-shadow: 0 4px 0 #2a67ca, 0 11px 20px rgba(24, 40, 90, 0.3);
      margin-bottom: 0.2rem;
    }

    .subtitle {
      text-align: center;
      color: #1f4f91;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(140px, 1fr));
      gap: 0.8rem;
      margin-bottom: 0.9rem;
    }

    .stat-card {
      background: #fff;
      border: 4px solid #fff;
      border-radius: 20px;
      box-shadow: 0 12px 0 rgba(32, 49, 99, 0.16);
      padding: 0.75rem;
      text-align: center;
    }

    .stat-label {
      font-family: "Baloo 2", cursive;
      color: #5e6ee2;
      font-size: 1.1rem;
    }

    .stat-value {
      font-family: "Baloo 2", cursive;
      font-size: 2rem;
      color: #2e4f88;
      line-height: 1.1;
    }

    .main {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 0.9rem;
    }

    .panel {
      background: #fff;
      border: 4px solid #fff;
      border-radius: 22px;
      box-shadow: 0 12px 0 rgba(32, 49, 99, 0.16);
      padding: 0.9rem;
    }

    .panel h2 {
      font-family: "Baloo 2", cursive;
      color: #2f4f88;
      margin-bottom: 0.5rem;
    }

    .lessons-list {
      list-style: none;
      display: grid;
      gap: 0.45rem;
    }

    .lessons-list li {
      border-radius: 14px;
      background: #f5f9ff;
      border: 2px dashed #c9d8ff;
      padding: 0.4rem 0.65rem;
      color: #3f5d92;
    }

    .chart-wrap {
      background: #f8fbff;
      border: 2px dashed #c9d8ff;
      border-radius: 16px;
      padding: 0.6rem;
      margin-bottom: 0.6rem;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
    }

    .actions {
      margin-top: 0.9rem;
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .btn {
      border: 3px solid #fff;
      border-radius: 14px;
      padding: 0.45rem 0.95rem;
      color: #fff;
      text-decoration: none;
      font-family: "Baloo 2", cursive;
      font-size: 1.05rem;
      box-shadow: 0 7px 0 rgba(0, 0, 0, 0.15);
      display: inline-block;
    }

    .btn.home { background: var(--blue); }
    .btn.play { background: var(--pink); }

    @media (max-width: 820px) {
      .stats { grid-template-columns: 1fr; }
      .main { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>My Learning Dashboard</h1>
    <p class="subtitle">Track progress, scores, and completed lessons</p>

    <section class="stats">
      <article class="stat-card">
        <p class="stat-label">User Progress</p>
        <p id="progressValue" class="stat-value">0%</p>
      </article>
      <article class="stat-card">
        <p class="stat-label">Best Score</p>
        <p id="bestScoreValue" class="stat-value">0</p>
      </article>
      <article class="stat-card">
        <p class="stat-label">Completed Lessons</p>
        <p id="completedCountValue" class="stat-value">0</p>
      </article>
    </section>

    <section class="main">
      <article class="panel">
        <h2>Simple Charts</h2>
        <div class="chart-wrap">
          <canvas id="scoreChart" width="520" height="260"></canvas>
        </div>
        <div class="chart-wrap">
          <canvas id="progressChart" width="520" height="220"></canvas>
        </div>
      </article>

      <article class="panel">
        <h2>Completed Lessons</h2>
        <ul id="completedLessonsList" class="lessons-list"></ul>
      </article>
    </section>

    <div class="actions">
      <a class="btn play" href="game.html">Play Game</a>
      <a class="btn home" href="index.html">Back Home</a>
    </div>
  </main>

  <script>
    function readNumber(key, fallback = 0) {
      const value = Number(localStorage.getItem(key));
      return Number.isFinite(value) ? value : fallback;
    }

    const lessonProgress = readNumber("lessonProgress", 0);
    const quizScore = readNumber("quizScore", 0);
    const quizTotal = readNumber("quizTotal", 5);
    const matchScore = readNumber("matchScore", 0);
    const matchTotal = readNumber("matchTotal", 4);

    const completedLessons = JSON.parse(localStorage.getItem("completedLessons") || "[]");
    const completedCount = Array.isArray(completedLessons) ? completedLessons.length : 0;
    const bestScore = Math.max(quizScore, matchScore);

    document.getElementById("progressValue").textContent = `${lessonProgress}%`;
    document.getElementById("bestScoreValue").textContent = String(bestScore);
    document.getElementById("completedCountValue").textContent = String(completedCount);

    const lessonsList = document.getElementById("completedLessonsList");
    if (completedCount === 0) {
      lessonsList.innerHTML = "<li>No lesson completed yet. Start lesson to earn stars!</li>";
    } else {
      completedLessons.forEach((lessonName) => {
        const li = document.createElement("li");
        li.textContent = `⭐ ${lessonName}`;
        lessonsList.appendChild(li);
      });
    }

    function drawBarChart() {
      const canvas = document.getElementById("scoreChart");
      const ctx = canvas.getContext("2d");
      const bars = [
        { label: "Quiz", value: quizScore, total: quizTotal, color: "#ff7eb6" },
        { label: "Match", value: matchScore, total: matchTotal, color: "#4f8cff" }
      ];

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#2f4f88";
      ctx.font = "700 24px 'Baloo 2'";
      ctx.fillText("Scores", 18, 30);

      bars.forEach((bar, index) => {
        const y = 70 + index * 95;
        const maxWidth = 360;
        const ratio = bar.total > 0 ? Math.min(bar.value / bar.total, 1) : 0;

        ctx.fillStyle = "#e8efff";
        ctx.fillRect(110, y, maxWidth, 36);

        ctx.fillStyle = bar.color;
        ctx.fillRect(110, y, maxWidth * ratio, 36);

        ctx.fillStyle = "#35548d";
        ctx.font = "700 20px 'Baloo 2'";
        ctx.fillText(bar.label, 24, y + 25);
        ctx.fillText(`${bar.value}/${bar.total}`, 485, y + 25);
      });
    }

    function drawDonutChart() {
      const canvas = document.getElementById("progressChart");
      const ctx = canvas.getContext("2d");
      const cx = 120;
      const cy = 110;
      const radius = 68;
      const progressRatio = Math.max(0, Math.min(lessonProgress / 100, 1));

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#2f4f88";
      ctx.font = "700 24px 'Baloo 2'";
      ctx.fillText("Lesson Progress", 18, 30);

      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.strokeStyle = "#e5edff";
      ctx.lineWidth = 20;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(cx, cy, radius, -Math.PI / 2, -Math.PI / 2 + (Math.PI * 2 * progressRatio));
      ctx.strokeStyle = "#62cfb6";
      ctx.lineWidth = 20;
      ctx.lineCap = "round";
      ctx.stroke();

      ctx.fillStyle = "#33558f";
      ctx.font = "700 26px 'Baloo 2'";
      ctx.fillText(`${lessonProgress}%`, 86, 118);

      ctx.font = "600 18px Fredoka";
      ctx.fillStyle = "#4a6596";
      ctx.fillText("Keep learning to reach 100%", 225, 115);
    }

    drawBarChart();
    drawDonutChart();
  </script>
</body>
</html>
